<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Display — Sandycaffee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .kitchen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .order-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .order-card.status-new { border-color: #e53e3e; }
    .order-card.status-preparing { border-color: #d69e2e; }
    .order-card.status-ready { border-color: #38a169; }
    .order-card-header {
      padding: 14px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
    }
    .order-num { font-size: 1rem; font-weight: 700; }
    .order-table { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .order-time { font-size: 0.75rem; color: rgba(255,255,255,0.35); text-align: right; }
    .order-items { padding: 12px 16px; }
    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.88rem;
    }
    .order-item:last-child { border-bottom: none; }
    .order-item .item-qty { font-weight: 700; color: var(--accent); margin-right: 8px; }
    .order-card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .order-card-footer .btn { flex: 1; justify-content: center; font-size: 0.8rem; }
    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-new { background: #e53e3e; animation: pulse 1s infinite; }
    .dot-preparing { background: #d69e2e; }
    .dot-ready { background: #38a169; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
    }
    .counter-badge {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">👨‍🍳 Kitchen Display</span>
      <div class="topbar-right">
        <div class="refresh-bar">
          <span id="lastRefresh">—</span>
          <span class="counter-badge" id="activeCount">0 active</span>
          <button class="btn btn-secondary btn-sm" onclick="loadOrders()">↺ Refresh</button>
        </div>
        <div class="user-badge"><div class="user-avatar" id="topbarAvatar">K</div><span id="topbarUserName">Kitchen</span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>
    <main class="page-content">
      <div class="filter-tabs" style="margin-bottom:20px;">
        <button class="filter-tab active" onclick="setFilter(this,'all')">All Orders</button>
        <button class="filter-tab" onclick="setFilter(this,'new')"><span class="status-dot dot-new"></span>New</button>
        <button class="filter-tab" onclick="setFilter(this,'preparing')"><span class="status-dot dot-preparing"></span>Preparing</button>
        <button class="filter-tab" onclick="setFilter(this,'ready')"><span class="status-dot dot-ready"></span>Ready</button>
      </div>
      <div id="kitchenGrid" class="kitchen-grid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/kitchen.js"></script>
</body>
</html>
